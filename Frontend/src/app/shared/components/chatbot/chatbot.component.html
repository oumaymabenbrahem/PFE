<div class="chatbot-container">
  <!-- The Chat Window -->
  <div class="chat-window" [ngClass]="{ 'open': isChatOpen }">
    <div class="chat-header">
      <div class="header-info">
        <svg class="bot-avatar-header" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <g fill="#3747eb">
            <!-- Head shape with speech bubble tail -->
            <path d="M100,10 C44.8,10 0,45.8 0,100 C0,123.6 10.4,145.2 27.2,161.4 L18,188 L46.4,176.4 C62.4,185.4 80.6,190 100,190 C155.2,190 200,154.2 200,100 C200,45.8 155.2,10 100,10 Z"/>
            <!-- White face plate -->
            <rect x="40" y="55" width="120" height="90" rx="30" fill="white"/>
            <!-- Eyes -->
            <path d="M60,95 Q70,80 80,95 Z" fill="#3747eb"/>
            <path d="M120,95 Q130,80 140,95 Z" fill="#3747eb"/>
            <!-- Smile -->
            <path d="M90,110 Q100,125 110,110" fill="none" stroke="#3747eb" stroke-width="8" stroke-linecap="round"/>
            <!-- Ears / Antennas -->
            <rect x="18" y="70" width="15" height="50" rx="7" fill="#3747eb" stroke="white" stroke-width="3"/>
            <rect x="167" y="70" width="15" height="50" rx="7" fill="#3747eb" stroke="white" stroke-width="3"/>
            <rect x="23" y="45" width="6" height="35" rx="3" fill="#3747eb" stroke="white" stroke-width="2"/>
            <rect x="171" y="45" width="6" height="35" rx="3" fill="#3747eb" stroke="white" stroke-width="2"/>
          </g>
        </svg>
        <div class="header-text">
          <h3>Chat-Bot</h3>
          <p class="status" [class.online]="!isLoading">{{ isLoading ? 'En train de traiter...' : 'En ligne' }}</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="Effacer l'historique" (click)="clearConversation()" *ngIf="showClearButton">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
          </svg>
        </button>
        <button class="close-btn" (click)="toggleChat()">✕</button>
      </div>
    </div>

    

    <!-- Messages Area -->
    <div class="chat-body" #chatBody>
      <div class="message-group" *ngFor="let msg of messages" [ngClass]="msg.sender">
        <div class="message" [ngClass]="{ 'error': msg.messageType === 'ERROR', 'loading': msg.isLoading }">
          <div class="message-text">
            {{ msg.text }}
          </div>
          <!-- Loading animation -->
          <div class="typing-indicator" *ngIf="msg.isLoading">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <div class="message-actions" *ngIf="!msg.isLoading">
          <span class="timestamp" *ngIf="msg.timestamp">{{ msg.timestamp }}</span>
          <button class="copy-btn" title="Copier" (click)="copyMessage(msg.text)">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-footer">
      <input
        type="text"
        [(ngModel)]="userInput"
        (keyup.enter)="sendMessage()"
        [disabled]="isLoading"
        placeholder="Écrivez votre question..."
        class="message-input"
      />
      <button
        class="send-btn"
        (click)="sendMessage()"
        [disabled]="isLoading || userInput.trim() === ''"
        title="Envoyer"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- The Floating Button -->
  <button class="chatbot-btn" (click)="toggleChat()" [class.open]="isChatOpen">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width: 75%; height: 75%;">
      <g fill="#3747eb">
        <!-- Head shape with speech bubble tail -->
        <path d="M100,10 C44.8,10 0,45.8 0,100 C0,123.6 10.4,145.2 27.2,161.4 L18,188 L46.4,176.4 C62.4,185.4 80.6,190 100,190 C155.2,190 200,154.2 200,100 C200,45.8 155.2,10 100,10 Z"/>
        <!-- White face plate -->
        <rect x="40" y="55" width="120" height="90" rx="30" fill="white"/>
        <!-- Eyes -->
        <path d="M60,95 Q70,80 80,95 Z" fill="#3747eb"/>
        <path d="M120,95 Q130,80 140,95 Z" fill="#3747eb"/>
        <!-- Smile -->
        <path d="M90,110 Q100,125 110,110" fill="none" stroke="#3747eb" stroke-width="8" stroke-linecap="round"/>
        <!-- Ears / Antennas -->
        <rect x="18" y="70" width="15" height="50" rx="7" fill="#3747eb" stroke="white" stroke-width="3"/>
        <rect x="167" y="70" width="15" height="50" rx="7" fill="#3747eb" stroke="white" stroke-width="3"/>
        <rect x="23" y="45" width="6" height="35" rx="3" fill="#3747eb" stroke="white" stroke-width="2"/>
        <rect x="171" y="45" width="6" height="35" rx="3" fill="#3747eb" stroke="white" stroke-width="2"/>
      </g>
    </svg>
    <span class="pulse" *ngIf="!isChatOpen"></span>
  </button>
</div>
