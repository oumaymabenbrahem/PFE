<div class="forgot-page">
  <div class="forgot-card">
    <div class="icon-wrap" aria-hidden="true">
      <svg viewBox="0 0 24 24" class="lock-icon" fill="none">
        <rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"></rect>
        <path d="M8 10V8a4 4 0 018 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
      </svg>
    </div>

    <h1>Mot de passe oublié ?</h1>
    <p>
      Entrez votre adresse e-mail et nous vous enverrons un code de
      réinitialisation.
    </p>

    <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" novalidate>
      <label for="reset-email">Adresse e-mail</label>
      <input
        id="reset-email"
        name="reset-email"
        type="email"
        [(ngModel)]="email"
        placeholder="vous@exemple.com"
        autocomplete="email"
        required
        [disabled]="isLoading"
      />

      <button type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Envoyer le code</span>
        <span *ngIf="isLoading" class="loading-text">
          <span class="spinner"></span> Envoi en cours...
        </span>
      </button>
    </form>

    <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>
    <p *ngIf="submitted" class="success-msg">
      Un code de vérification a été envoyé à votre adresse email.
    </p>

    <div class="bottom-row">
      <span>Vous vous souvenez ?</span>
      <a routerLink="/login">Se connecter</a>
    </div>
  </div>
</div>
