<section class="profile-page">
  <div class="profile-container">
    <div class="profile-card banner-card">
      <div class="profile-banner" aria-hidden="true"></div>

      <div class="profile-avatar-row">
        <div class="avatar-wrap">
          <div class="avatar-circle">{{ getInitials() }}</div>
        </div>

        <div class="profile-main">
          <div class="profile-left">
            <h2 class="name">{{ user?.nom || 'Utilisateur' }}</h2>
            <div class="email">{{ user?.email || '-' }}</div>
            <div class="badges">
              <span class="badge active">Membre actif</span>
            </div>
          </div>

          <div class="profile-right">
            <button class="btn btn-outline small">Modifier</button>
          </div>
        </div>
      </div>
    </div>

    <div class="profile-card stats-card">
      <div class="stats-row">
        <ng-container *ngFor="let stat of profileStats; let last = last">
          <div class="stat">
            <div class="value">{{ stat.value }}</div>
            <div class="label">{{ stat.label }}</div>
          </div>
          <div class="divider" *ngIf="!last"></div>
        </ng-container>
      </div>
    </div>

    <div class="profile-card details-card">
      <div class="card-header">
        <div class="icon-box">i</div>
        <h3>Informations personnelles</h3>
      </div>

      <form class="details-form">
        <div class="fields">
          <div class="field">
            <label>NOM</label>
            <div class="input-icon">
              <span class="icon">👤</span>
              <input [value]="user?.nom" readonly />
            </div>
          </div>

          <div class="field">
            <label>ADRESSE EMAIL</label>
            <div class="input-icon">
              <span class="icon">✉️</span>
              <input [value]="user?.email" readonly />
            </div>
          </div>

         

          <div class="field">
            <label>ORGANISATION</label>
            <div class="input-icon">
              <span class="icon">🏢</span>
              <input placeholder="TEST2i" />
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn">Annuler</button>
          <button type="button" class="btn btn-primary">Mettre à jour le profil</button>
        </div>
      </form>
    </div>

    <div class="profile-card security-card">
      <div class="card-header">
        <div class="icon-box">🔒</div>
        <h3>Sécurité & Accès</h3>
      </div>

      <div class="security-list">
        <div class="security-item">
          <div class="left"><span class="item-icon">🔑</span></div>
          <div class="center">
            <div class="title">Mot de passe</div>
           
            
          </div>
          <div class="right"><button class="btn btn-outline small" routerLink="/forgot-password">Modifier</button></div>
        </div>

        

        <div class="security-item">
          <div class="left"><span class="item-icon">❗</span></div>
          <div class="center">
            <div class="title">Supprimer le compte</div>
          </div>
          <div class="right"><button class="btn btn-outline danger small">Supprimer</button></div>
        </div>
      </div>
    </div>
  </div>
</section>
