<div class="reset-page">
  <div class="reset-card">
    <div class="icon-wrap" aria-hidden="true">
      <svg viewBox="0 0 24 24" class="lock-icon" fill="none">
        <path d="M7 10V8a5 5 0 0110 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        <rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"></rect>
      </svg>
    </div>

    <h1>Nouveau mot de passe</h1>
    <p>Choisissez un mot de passe sécurisé pour votre compte.</p>
    <p *ngIf="emailMask" class="email-mask">{{ emailMask }}</p>

    <form (ngSubmit)="onSubmit()" #resetForm="ngForm" novalidate>
      <label for="new-password">Nouveau mot de passe</label>
      <div class="input-wrap">
        <input
          id="new-password"
          name="new-password"
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          (input)="onPasswordInput()"
          placeholder="Nouveau mot de passe"
          autocomplete="new-password"
          required
          [disabled]="isLoading"
        />
        <button type="button" class="eye-btn" (click)="togglePasswordVisibility('password')" aria-label="Afficher ou masquer le mot de passe">
          <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"></circle>
          </svg>
          <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none">
            <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
            <path d="M10.58 10.58A3 3 0 0012 15a3 3 0 003-3 3 3 0 00-4.42-2.42Z" stroke="currentColor" stroke-width="2"></path>
          </svg>
        </button>
      </div>
      <!-- Erreur longueur mot de passe -->
      <span class="field-error" *ngIf="password.length > 0 && password.length < 8">
        Le mot de passe doit contenir au moins 8 caractères.
      </span>


      <label for="confirm-password">Confirmer le mot de passe</label>
      <div class="input-wrap">
        <input
          id="confirm-password"
          name="confirm-password"
          [type]="showConfirmPassword ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          placeholder="Confirmer le mot de passe"
          autocomplete="new-password"
          required
          [disabled]="isLoading"
        />
        <button type="button" class="eye-btn" (click)="togglePasswordVisibility('confirm')" aria-label="Afficher ou masquer la confirmation du mot de passe">
          <svg *ngIf="!showConfirmPassword" viewBox="0 0 24 24" fill="none">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"></circle>
          </svg>
          <svg *ngIf="showConfirmPassword" viewBox="0 0 24 24" fill="none">
            <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
            <path d="M10.58 10.58A3 3 0 0012 15a3 3 0 003-3 3 3 0 00-4.42-2.42Z" stroke="currentColor" stroke-width="2"></path>
          </svg>
        </button>
      </div>
      <!-- Erreur correspondance -->
      <span class="field-error" *ngIf="confirmPassword.length > 0 && password !== confirmPassword">
        Les mots de passe ne correspondent pas.
      </span>
      <span class="field-success" *ngIf="confirmPassword.length > 0 && password === confirmPassword && password.length >= 8">
        ✓ Les mots de passe correspondent
      </span>

      <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>
      <p *ngIf="successMessage" class="success-msg">{{ successMessage }}</p>

      <button type="submit" class="reset-btn comfort-button" [disabled]="isLoading">
        <div class="button-background"></div>
        <span class="button-text" *ngIf="!isLoading">Réinitialiser le mot de passe</span>
        <span *ngIf="isLoading" class="loading-text button-text">
          <span class="spinner"></span> Réinitialisation...
        </span>
        <div class="button-glow"></div>
      </button>
    </form>
  </div>
</div>
