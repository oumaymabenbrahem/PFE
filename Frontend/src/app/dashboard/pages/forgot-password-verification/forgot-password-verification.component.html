<div class="verification-page">
  <div class="verification-card">
    <div class="icon-wrap" aria-hidden="true">
      <svg viewBox="0 0 24 24" class="mail-icon" fill="none">
        <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2"></rect>
        <path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </div>

    <h1>Verification</h1>
    <p>Un code a 6 chiffres a ete envoye a</p>
    <p class="email-mask">{{ emailMask }}</p>

    <!-- Timer countdown -->
    <div class="timer-wrap" [class.expired]="timerExpired">
      <svg viewBox="0 0 24 24" fill="none" class="timer-icon">
        <circle cx="12" cy="13" r="8" stroke="currentColor" stroke-width="2"></circle>
        <path d="M12 9v4l2.5 2.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        <path d="M9 2h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
      </svg>
      <span *ngIf="!timerExpired">Code valide pendant <strong>{{ timerDisplay }}</strong></span>
      <span *ngIf="timerExpired" class="expired-text">Le code a expiré</span>
    </div>

    <div class="code-grid" aria-label="Code de verification">
      <input
        *ngFor="let digit of codeDigits; let i = index"
        #codeInput
        type="text"
        maxlength="1"
        inputmode="numeric"
        [value]="digit"
        [disabled]="isLoading || timerExpired"
        (beforeinput)="onDigitBeforeInput($event, i)"
        (keydown)="onDigitKeydown($event, i)"
        (paste)="onPaste($event)"
      />
    </div>

    <p *ngIf="verificationError" class="error-msg">{{ verificationError }}</p>

    <button
      type="button"
      class="verify-btn"
      (click)="verifyCode()"
      [disabled]="isLoading || timerExpired"
    >
      <span *ngIf="!isLoading">Verifier le code</span>
      <span *ngIf="isLoading" class="loading-text">
        <span class="spinner"></span> Vérification...
      </span>
    </button>

    <div class="bottom-row">
      <span *ngIf="!canResend && !timerExpired">Renvoyer dans {{ resendDisplay }}</span>
      <span *ngIf="(canResend || timerExpired) && resendCount < maxResend">Code non reçu ?</span>
      <span *ngIf="resendCount >= maxResend">Limite de renvoi atteinte</span>

      <button
        *ngIf="(canResend || timerExpired) && resendCount < maxResend"
        type="button"
        class="resend-btn"
        (click)="resendCode()"
        [disabled]="isResending"
      >
        <span *ngIf="!isResending">Renvoyer le code</span>
        <span *ngIf="isResending">Envoi...</span>
      </button>
    </div>
  </div>
</div>
