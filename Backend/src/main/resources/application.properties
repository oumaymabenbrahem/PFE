spring.application.name=Backend
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
server.port=${BACKEND_PORT:8081}

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret.key=${JWT_SECRET}
jwt.expiration.time=${JWT_EXPIRATION_MS:86400000}

# Multipart Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# File Storage Configuration
app.upload.dir=uploads/projects/

# Logging
logging.level.root=INFO
logging.level.com.example.backend=DEBUG

# Jira OAuth 2.0 Configuration
jira.client-id=${JIRA_CLIENT_ID}
jira.client-secret=${JIRA_CLIENT_SECRET}
jira.redirect-uri=${JIRA_REDIRECT_URI:http://localhost:8081/api/jira/callback}

# AES Encryption Key (Must be exactly 16, 24, or 32 bytes)
app.encryption.key=${APP_ENCRYPTION_KEY}

# Xray Cloud API Configuration
xray.client-id=${XRAY_CLIENT_ID}
xray.client-secret=${XRAY_CLIENT_SECRET}

# Email / SMTP Configuration (Gmail)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# OTP Configuration
app.otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:10}
app.otp.max-resend-attempts=${OTP_MAX_RESEND_ATTEMPTS:3}
app.otp.resend-block-minutes=${OTP_RESEND_BLOCK_MINUTES:15}

# Display sender (visible to the user)
app.mail.from-address=${MAIL_FROM_ADDRESS:noreply@Test2i.com}
app.mail.from-name=${MAIL_FROM_NAME:TEST2i}

# Grok (xAI) API Configuration (for Chatbot)
# Get your API key from: https://console.x.ai/
grok.api-key=${GROK_API_KEY}
grok.model=${GROK_MODEL:grok-3-mini}

# Google OAuth2 Configuration
# Get client ID from: https://console.cloud.google.com/apis/credentials
google.oauth.client-id=${GOOGLE_CLIENT_ID}

# GitHub OAuth2 Configuration
# Get client ID/secret from: https://github.com/settings/developers
github.oauth.client-id=${GITHUB_CLIENT_ID}
github.oauth.client-secret=${GITHUB_CLIENT_SECRET}
github.oauth.redirect-uri=${GITHUB_REDIRECT_URI:http://localhost:4200/login}
